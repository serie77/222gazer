            <h2>How Detection Works</h2>
            <p>222 reads Axiom's UI badges (the small platform icons next to token names) to determine which platform a token is on. It also checks for platform-specific links like <code>pump.fun/coin/</code>, <code>bonk.fun/token/</code>, and <code>bags.fm/</code>. This detection happens automatically — you never need to manually specify the platform.</p>
